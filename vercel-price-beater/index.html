<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Price Beater — Am I Cheapest?</title>
<style>
  :root{--bg:#f4f5f7;--card:#fff;--bd:#e3e6eb;--tx:#0f1117;--mut:#6b7280;--bl:#1a56db;--gn:#16a34a;--rd:#dc2626;--am:#d97706}
  *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
  header{background:var(--card);border-bottom:1px solid var(--bd);padding:14px 22px;display:flex;align-items:center;gap:10px}
  header h1{font-size:18px;margin:0}.sub{color:var(--mut);font-size:12px}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 22px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--mut);text-transform:uppercase}
  input,select{height:34px;padding:0 9px;border:1px solid #cfd5de;border-radius:7px;font-size:13px;background:#fff}
  button{height:34px;padding:0 14px;border-radius:7px;border:1px solid var(--bl);background:var(--bl);color:#fff;font-weight:600;cursor:pointer;font-size:13px}
  button.ghost{background:#fff;color:var(--tx);border-color:#cfd5de}
  button:disabled{opacity:.5;cursor:default}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;color:var(--mut);font-size:10px;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--bd)}
  td{padding:8px 10px;border-top:1px solid #eef1f4;vertical-align:top}
  a{color:var(--bl)}
  .sc{font-weight:800}.cheap{color:var(--gn)}.rep{color:var(--rd)}.close{color:var(--am)}
  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
  .scell{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:10px;text-align:center}
  .scell .v{font-size:20px;font-weight:800}
  textarea{width:100%;border:1px solid #cfd5de;border-radius:7px;padding:8px;font-family:monospace;font-size:12px}
</style>
</head>
<body>
<header>
  <h1>🏷️ price.beater</h1>
  <span class="sub">Am I the cheapest dealer? — real listings, exact prices</span>
</header>
<div id="root"><div class="wrap">Loading…</div></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;
const money = (n) => "$" + (Number(n) || 0).toLocaleString();
const LS = "pb_inventory", LR = "pb_results";

function parseCsvLine(line){const o=[];let c="",q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(q){if(ch==='"'){if(line[i+1]==='"'){c+='"';i++}else q=false}else c+=ch}else{if(ch==='"')q=true;else if(ch===","){o.push(c);c=""}else c+=ch}}o.push(c);return o}
function parseCsv(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2)return[];
  const h=parseCsvLine(lines[0]).map(x=>x.trim().toLowerCase());
  const idx=(...n)=>{for(const x of n){const i=h.indexOf(x);if(i>=0)return i}for(let i=0;i<h.length;i++)if(n.some(x=>h[i].includes(x)))return i;return -1};
  const iV=idx("vin"),iY=idx("year"),iMk=idx("make"),iMd=idx("model"),iT=idx("trim"),iMi=idx("mileage","miles"),iP=idx("price"),iS=idx("stock number","stock");
  const out=[];
  for(let r=1;r<lines.length;r++){const c=parseCsvLine(lines[r]);const num=x=>Number(String(c[x]??"").replace(/[^0-9.]/g,""))||0;
    const year=iY>=0?Math.round(num(iY)):0,make=(c[iMk]||"").trim(),model=(c[iMd]||"").trim();if(!year||!make||!model)continue;
    out.push({vin:(c[iV]||"").trim().toUpperCase()||("MAN-"+r),year,make,model,trim:(c[iT]||"").trim(),mileage:iMi>=0?Math.round(num(iMi)):0,price:iP>=0?Math.round(num(iP)):0,stock:(c[iS]||"").trim()})}
  return out;
}

function App(){
  const [inv,setInv]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS)||"[]")}catch{return[]}});
  const [res,setRes]=useState(()=>{try{return JSON.parse(localStorage.getItem(LR)||"{}")}catch{return{}}});
  const [add,setAdd]=useState({vin:"",year:"",make:"",model:"",trim:"",mileage:"",price:""});
  const [zip,setZip]=useState(()=>localStorage.getItem("pb_zip")||"45014");
  const [sort,setSort]=useState("make");
  const [busy,setBusy]=useState(false);const [status,setStatus]=useState("");const [decoding,setDecoding]=useState(false);
  const saveInv=(x)=>{setInv(x);localStorage.setItem(LS,JSON.stringify(x))};
  const saveRes=(x)=>{setRes(x);localStorage.setItem(LR,JSON.stringify(x))};
  useEffect(()=>localStorage.setItem("pb_zip",zip),[zip]);
  // clear stuck scanning
  useEffect(()=>{let ch=false;const n={...res};for(const k in n)if(n[k]&&n[k].status==="scanning"){delete n[k];ch=true}if(ch)saveRes(n)},[]);

  const decode=async()=>{const v=add.vin.replace(/[^A-Za-z0-9]/g,"").toUpperCase().slice(0,17);if(v.length!==17){alert("Enter a 17-char VIN");return}
    setDecoding(true);try{const d=await fetch("/api/decode?vin="+v).then(r=>r.json());if(d.error)throw new Error(d.error);
      setAdd(a=>({...a,vin:v,year:String(d.year),make:d.make,model:d.model,trim:d.trim||""}))}catch(e){alert(e.message)}setDecoding(false)};
  const addVeh=()=>{const year=Number(add.year),make=add.make.trim(),model=add.model.trim();if(!year||!make||!model){alert("Year, make, model required");return}
    const v=add.vin.replace(/[^A-Za-z0-9]/g,"").toUpperCase();
    saveInv([{vin:v.length===17?v:"MAN-"+Date.now(),year,make,model,trim:add.trim.trim(),mileage:Number(add.mileage)||0,price:Number(add.price)||0},...inv]);
    setAdd({vin:"",year:"",make:"",model:"",trim:"",mileage:"",price:""})};
  const scanOne=async(v,acc)=>{
    const r=await fetch("/api/scan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({year:v.year,make:v.make,model:v.model,trim:v.trim,zip,myPrice:v.price})}).then(x=>x.json()).catch(()=>({error:"network"}));
    if(r.error&&/configured/i.test(r.error)){setStatus("⚠️ "+r.error);return null}
    if(!r.found)return{status:r.error?"error":"no_comps",error:r.error,scanned:!r.error,competitors:[]};
    return{status:r.status,scanned:true,competitors:r.competitors,cheapest:r.cheapestPrice,dealer:r.dealer,location:r.location,link:r.link,suggested:r.suggested,gap:r.gap};
  };
  const scan=async(v)=>{const cur={...res,[v.vin]:{status:"scanning"}};saveRes(cur);const out=await scanOne(v);if(out===null){const c={...cur};delete c[v.vin];saveRes(c);return}saveRes({...cur,[v.vin]:out})};
  const scanAll=async()=>{if(busy)return;const list=inv.filter(v=>!res[v.vin]||!res[v.vin].scanned);if(!list.length){alert("All scanned");return}
    setBusy(true);let acc={...res};for(let i=0;i<list.length;i++){const v=list[i];setStatus(`Scanning ${i+1}/${list.length}: ${v.year} ${v.make} ${v.model}`);acc={...acc,[v.vin]:{status:"scanning"}};saveRes(acc);
      const out=await scanOne(v);if(out===null){const c={...acc};delete c[v.vin];saveRes(c);setBusy(false);return}acc={...acc,[v.vin]:out};saveRes(acc);await new Promise(r=>setTimeout(r,600))}
    setStatus(`✓ Done — ${list.length} scanned`);setBusy(false)};
  const importCsv=(e)=>{const f=e.target.files[0];if(!f)return;f.text().then(t=>{const items=parseCsv(t);if(!items.length){alert("No rows — need Year/Make/Model columns");return}saveInv(items);setStatus(`Imported ${items.length} vehicles`)})};
  const sortFn=(a,b)=>sort==="make"?`${a.make} ${a.model}`.localeCompare(`${b.make} ${b.model}`):(a.price||0)-(b.price||0);
  const exportCsv=()=>{const rows=[["VIN","Year","Make","Model","Trim","Miles","My Price","Cheapest Price","Dealer","Location","Reprice"]];
    [...inv].sort(sortFn).forEach(v=>{const r=res[v.vin]||{};rows.push([v.vin,v.year,v.make,v.model,v.trim,v.mileage,v.price,r.cheapest||"",r.dealer||"",r.location||"",r.suggested||""])});
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="price-beater.csv";a.click()};

  return <div className="wrap">
    <div className="card">
      <div className="lbl">➕ Add a vehicle</div>
      <div className="row" style={{marginTop:8}}>
        <input value={add.vin} onChange={e=>setAdd(a=>({...a,vin:e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,17)}))} placeholder="VIN (17 chars) — auto-fills" style={{width:260,fontFamily:"monospace"}}/>
        <button className="ghost" onClick={decode} disabled={decoding}>{decoding?"Decoding…":"🔍 Decode VIN"}</button>
        <span className="sub">or fill below</span>
      </div>
      <div className="row" style={{marginTop:8}}>
        {[["year","Year",70],["make","Make",110],["model","Model",120],["trim","Trim",120],["mileage","Miles",90],["price","My Price",100]].map(([k,p,w])=>
          <input key={k} value={add[k]} onChange={e=>setAdd(a=>({...a,[k]:e.target.value}))} placeholder={p} style={{width:w}}/>)}
        <button onClick={addVeh}>Add</button>
      </div>
    </div>

    <div className="card">
      <div className="row">
        <button onClick={scanAll} disabled={busy}>{busy?"Scanning…":"▶ Scan All"}</button>
        <span className="sub">Reference ZIP</span><input value={zip} onChange={e=>setZip(e.target.value.replace(/[^0-9]/g,"").slice(0,5))} style={{width:80}}/>
        <select value={sort} onChange={e=>setSort(e.target.value)}><option value="make">Sort: Make</option><option value="price">Sort: My Price</option></select>
        <button className="ghost" onClick={exportCsv}>⬇ Export CSV</button>
        <label className="ghost" style={{display:"inline-flex",alignItems:"center",height:34,padding:"0 12px",borderRadius:7,border:"1px solid #cfd5de",cursor:"pointer"}}>⬆ Import CSV<input type="file" accept=".csv" onChange={importCsv} style={{display:"none"}}/></label>
        {Object.keys(res).length>0 && <button className="ghost" onClick={()=>saveRes({})}>Reset scans</button>}
      </div>
      {status && <div style={{marginTop:8,fontSize:12,color:"#444"}}>{status}</div>}
    </div>

    {inv.length===0 ? <div className="card sub">No vehicles yet — add one above or import a CSV.</div> :
    <div className="card" style={{padding:0,overflowX:"auto"}}>
      <table><thead><tr>{["Status","My Price","Vehicle","Miles","Cheapest Dealer","Location","Cheapest Price","Reprice",""].map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
      <tbody>{[...inv].sort(sortFn).map(v=>{const r=res[v.vin]||{};const sm={cheapest:["✓ Cheapest","#16a34a"],not_cheapest:["✕ Reprice","#dc2626"],close:["⚠ Close","#d97706"],no_comps:["No comps","#6b7280"],error:["error","#dc2626"],scanning:["scanning…","#1a56db"]}[r.status]||["—","#9ca3af"];
        return <tr key={v.vin}>
          <td style={{color:sm[1],fontWeight:600}} title={r.error||""}>{sm[0]}</td>
          <td style={{fontWeight:700}}>{money(v.price)}</td>
          <td>{v.year} {v.make} {v.model} <span className="sub">{v.trim}</span></td>
          <td>{v.mileage?v.mileage.toLocaleString():"—"}</td>
          <td>{r.dealer||"—"}</td>
          <td>{r.location||"—"}</td>
          <td className="sc cheap">{r.cheapest?(r.link?<a href={r.link} target="_blank" rel="noopener">{money(r.cheapest)}</a>:money(r.cheapest)):"—"}</td>
          <td className="rep">{r.suggested?money(r.suggested):"—"}</td>
          <td><button className="ghost" style={{height:26,padding:"0 8px"}} onClick={()=>scan(v)} disabled={busy||r.status==="scanning"}>{r.status==="scanning"?"…":"🤖 Scan"}</button></td>
        </tr>})}</tbody></table>
    </div>}
    <div className="sub" style={{textAlign:"center",marginTop:14}}>Engines (set in Vercel env): MarketCheck → Auto.dev → Brave → SerpAPI</div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
