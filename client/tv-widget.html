<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  #tv_root { width: 100%; }
</style>
</head>
<body>
<div id="tv_root"></div>
<script>
(function () {
  var p   = new URLSearchParams(location.search);
  var w   = p.get("w")  || "advanced-chart";
  var s   = (p.get("s") || "SPY").toUpperCase();
  var t   = p.get("t") === "light" ? "light" : "dark";
  var h   = Math.min(900, Math.max(60, parseInt(p.get("h") || "500", 10)));
  var iv  = p.get("iv") || "D";
  var bg  = t === "dark" ? "#0a0e1a" : "#f0f4f9";
  // Parse studies from URL: ?st=RSI,MACD,BB,EMA,VWAP
  var stParam = p.get("st") || "";
  var studiesMap = {
    RSI:  "STD;RSI",
    MACD: "STD;MACD",
    BB:   "STD;Bollinger_Bands",
    EMA:  "STD;EMA",
    VWAP: "STD;VWAP",
    ATR:  "STD;Average_True_Range",
    VOL:  "STD;Volume",
    STOCH:"STD;Stochastic",
    ADX:  "STD;ADX",
    CCI:  "STD;CCI",
  };
  var studies = stParam ? stParam.split(",").map(function(k){ return studiesMap[k.trim()] || k.trim(); }).filter(Boolean) : ["STD;MACD","STD;RSI"];

  document.documentElement.style.background = bg;
  document.body.style.background = bg;
  document.getElementById("tv_root").style.height = h + "px";

  // ── Advanced Chart — programmatic TradingView.widget() via tv.js ──────────
  // tv.js exposes a proper constructor API; no document.currentScript needed.
  if (w === "advanced-chart") {
    var tvjs = document.createElement("script");
    tvjs.src = "https://s3.tradingview.com/tv.js";
    tvjs.onload = function () {
      /* global TradingView */
      new TradingView.widget({
        container_id:        "tv_root",
        symbol:              s,
        interval:            iv,
        timezone:            "America/New_York",
        theme:               t,
        style:               "1",
        locale:              "en",
        toolbar_bg:          t === "dark" ? "#151f30" : "#f0f4f9",
        enable_publishing:   false,
        allow_symbol_change: false,
        save_image:          false,
        studies:             studies,
        height:              h,
        width:               "100%",
        hide_side_toolbar:   false,
        hide_legend:         false,
        withdateranges:      false,
      });
    };
    document.head.appendChild(tvjs);
    return;
  }

  // ── All other embed widgets ───────────────────────────────────────────────
  // TradingView embed-widget-*.js scripts scan document.scripts for their own
  // src URL, then read textContent for the config JSON.
  // We attach the script element to the DOM (so it appears in document.scripts)
  // BEFORE triggering the load by setting .src — this guarantees the script
  // element with its textContent is visible to TradingView when it runs.

  var D = { colorTheme: t, locale: "en", isTransparent: false, width: "100%", height: h };

  var CFGS = {
    "technical-analysis": Object.assign({}, D, {
      symbol: s, interval: "1D", showIntervalTabs: true, displayMode: "multiple"
    }),
    "financials": Object.assign({}, D, {
      symbol: s, displayMode: "regular"
    }),
    "symbol-info": Object.assign({}, D, {
      symbol: s, largeChartUrl: ""
    }),
    "timeline": Object.assign({}, D, {
      feedMode: "symbol", symbol: s, displayMode: "regular"
    }),
    "mini-symbol-overview": Object.assign({}, D, {
      symbol:         s,
      dateRange:      "3M",
      trendLineColor: t === "dark" ? "#22d47e" : "#059669",
      underLineColor: t === "dark" ? "rgba(34,212,126,0.12)" : "rgba(5,150,105,0.10)"
    }),
    "market-overview": Object.assign({}, D, {
      showFloatingTooltip: false,
      tabs: [{ title: "Indices", symbols: [
        { s: "FOREXCOM:SPXUSD", d: "S&P 500"    },
        { s: "FOREXCOM:NSXUSD", d: "Nasdaq 100" },
        { s: "FOREXCOM:DJI",    d: "Dow Jones"  },
        { s: "FOREXCOM:VIXUSD", d: "VIX"        }
      ]}]
    }),
    "events": Object.assign({}, D, {
      importanceFilter: "-1,0,1",
      currencyFilter:   "USD,EUR,GBP,JPY,AUD,CAD,CHF,CNY"
    })
  };

  var cfg       = CFGS[w] || CFGS["technical-analysis"];
  var cfgStr    = JSON.stringify(cfg);
  var scriptSrc = "https://s3.tradingview.com/external-embedding/embed-widget-" + w + ".js";

  // Build the standard TradingView widget HTML structure
  var container = document.createElement("div");
  container.className = "tradingview-widget-container";
  container.style.cssText = "width:100%;height:" + h + "px";

  var inner = document.createElement("div");
  inner.className = "tradingview-widget-container__widget";
  inner.style.cssText = "width:100%;height:" + h + "px";
  container.appendChild(inner);

  // Attach script element to DOM first (so it's in document.scripts),
  // set textContent (the JSON config), then set src last to trigger load.
  var embedScript = document.createElement("script");
  embedScript.type = "text/javascript";
  container.appendChild(embedScript);          // 1. in DOM → visible to TradingView scan
  embedScript.textContent = cfgStr;            // 2. config JSON
  embedScript.src         = scriptSrc;         // 3. trigger async load

  document.getElementById("tv_root").appendChild(container);
})();
</script>
</body>
</html>
