<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>html,body{margin:0;padding:0;height:100%;background:transparent;overflow:hidden}#tv{width:100%;height:100vh}</style>
</head>
<body>
  <div id="tv"></div>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    (function () {
      var q = new URLSearchParams(location.search);
      var symbol = (q.get("s") || "SPY").toUpperCase();
      var iv = q.get("iv") || "D";            // "1","5","15","60","D","W"
      var theme = (q.get("t") || "light").toLowerCase() === "dark" ? "dark" : "light";
      var st = (q.get("st") || "").split(",").map(function (s) { return s.trim().toLowerCase(); }).filter(Boolean);
      // Friendly study names → TradingView study configs (with EMA lengths).
      function mapStudy(name) {
        if (name === "ema9")  return { id: "MAExp@tv-basicstudies", inputs: { length: 9 } };
        if (name === "ema21") return { id: "MAExp@tv-basicstudies", inputs: { length: 21 } };
        if (name === "ema50") return { id: "MAExp@tv-basicstudies", inputs: { length: 50 } };
        if (name === "vwap")  return "VWAP@tv-basicstudies";
        if (name === "volume") return "Volume@tv-basicstudies";
        if (name === "rsi")   return "RSI@tv-basicstudies";
        if (name === "macd")  return "MACD@tv-basicstudies";
        return name;   // pass through raw study ids
      }
      var studies = st.length
        ? st.map(mapStudy)
        : ["MASimple@tv-basicstudies", "Volume@tv-basicstudies"];
      function build() {
        if (!window.TradingView) { setTimeout(build, 200); return; }
        new TradingView.widget({
          container_id: "tv",
          symbol: symbol,
          interval: iv,
          autosize: true,
          timezone: "America/New_York",
          theme: theme,
          style: "1",              // candles
          locale: "en",
          hide_side_toolbar: false,
          allow_symbol_change: true,
          withdateranges: true,
          studies: studies,
          backgroundColor: theme === "dark" ? "#0f1318" : "#ffffff"
        });
      }
      build();
    })();
  </script>
</body>
</html>
