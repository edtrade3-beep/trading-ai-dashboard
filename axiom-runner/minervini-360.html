<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Minervini 360 — Trend Template (Live)</title>
<style>
  :root{
    --bg:#0b0e14;--panel:#10141d;--grid:#1b212c;--txt:#e7ecf3;--mut:#8a94a6;
    --green:#16b06a;--red:#e0433f;--yellow:#d6a312;--blue:#3d7bff;
    --chip:#161b25;--chipB:#222a37;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1280px;margin:0 auto;padding:14px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px;min-height:32px}
  .chip{background:var(--chip);border:1px solid var(--chipB);border-radius:7px;
    padding:6px 10px;font-size:12px;display:flex;gap:6px;align-items:center;line-height:1}
  .chip b{color:var(--mut);font-weight:600}
  .chip .v{font-weight:700}
  .chip.up .v{color:var(--green)}.chip.dn .v{color:var(--red)}.chip.warn .v{color:var(--yellow)}
  .tag{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;letter-spacing:.3px;margin-left:auto}
  .tag.g{background:rgba(22,176,106,.18);border:1px solid var(--green);color:#5ee0a3}
  .tag.r{background:rgba(224,67,63,.18);border:1px solid var(--red);color:#ff8a86}
  .tag.y{background:rgba(214,163,18,.18);border:1px solid var(--yellow);color:#f2cf5e}
  .bar{display:flex;align-items:center;gap:10px;background:var(--panel);
    border:1px solid var(--grid);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:13px}
  .bar input{background:#0c0f16;border:1px solid var(--chipB);color:var(--txt);
    border-radius:6px;padding:7px 10px;font-size:15px;font-weight:700;width:120px;text-transform:uppercase}
  .bar button{background:#1d2533;border:1px solid var(--chipB);color:var(--txt);
    border-radius:6px;padding:7px 14px;cursor:pointer;font-weight:600}
  .bar button:hover{background:#27313f}
  .bar .tpl{margin-left:auto;color:var(--mut)}
  .grid{display:grid;grid-template-columns:1fr 300px;gap:10px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--grid);border-radius:10px;overflow:hidden;position:relative}
  canvas{display:block;width:100%}
  .legend{position:absolute;left:14px;top:10px;font-size:13px;color:var(--mut);pointer-events:none}
  .legend b{color:var(--txt)}
  /* checklist */
  .cl{padding:12px 14px}
  .cl h3{margin:0 0 4px;font-size:14px}
  .cl .sub{color:var(--mut);font-size:12px;margin-bottom:12px}
  .crit{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-top:1px solid #161b24;font-size:12.5px}
  .crit:first-of-type{border-top:none}
  .crit .dot{width:18px;height:18px;border-radius:50%;flex:0 0 18px;display:flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:800;margin-top:1px}
  .crit.pass .dot{background:rgba(22,176,106,.2);color:#5ee0a3;border:1px solid var(--green)}
  .crit.fail .dot{background:rgba(224,67,63,.2);color:#ff8a86;border:1px solid var(--red)}
  .crit.fail span{color:#b9c0cd}
  .scorebox{text-align:center;padding:14px 0 6px}
  .scorebox .n{font-size:38px;font-weight:800;line-height:1}
  .scorebox .n.g{color:var(--green)}.scorebox .n.y{color:var(--yellow)}.scorebox .n.r{color:var(--red)}
  .scorebox .l{color:var(--mut);font-size:12px;margin-top:3px}
  .note{color:var(--mut);font-size:11px;margin-top:10px;line-height:1.5}
  .err{color:#ff8a86;padding:14px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="chips" id="chips"></div>

  <div class="bar">
    <span style="font-weight:800;font-size:15px">Trend Template</span>
    <input id="sym" value="ARM" maxlength="6" />
    <button onclick="load()">Scan</button>
    <span id="quick"></span>
    <span class="tpl">Live · Yahoo daily · Minervini SEPA criteria</span>
  </div>

  <div class="grid">
    <div class="card">
      <canvas id="cv"></canvas>
      <div class="legend"><b id="lSym">—</b> · 1D · <span id="lLast"></span></div>
    </div>
    <div class="card cl" id="panel"></div>
  </div>
</div>

<script>
let DATA=null;
const $=id=>document.getElementById(id);
// When served by the platform, use same-origin. In the file/preview pane, fall back to the local server.
const API=(location.protocol==='http:'||location.protocol==='https:')?'':'http://localhost:3000';

['ARM','NVDA','TSLA','PLTR','AAPL'].forEach(s=>{
  const b=document.createElement('button');b.textContent=s;b.style.cssText='margin-left:4px;padding:5px 9px;font-size:12px';
  b.onclick=()=>{$('sym').value=s;load();};$('quick').appendChild(b);
});

async function load(){
  const sym=($('sym').value||'ARM').trim().toUpperCase();
  $('panel').innerHTML='<div class="sub" style="padding:14px">Scanning '+sym+'…</div>';
  $('chips').innerHTML='';
  try{
    const r=await fetch(API+'/api/market/trend-template?symbol='+encodeURIComponent(sym));
    const j=await r.json();
    if(j.error) throw new Error(j.error);
    DATA=j; renderChips(j); renderPanel(j); draw();
  }catch(e){
    $('panel').innerHTML='<div class="err">Could not load '+sym+': '+e.message+'</div>';
  }
}

function renderChips(j){
  const box=$('chips'); box.innerHTML='';
  const stageClass=j.qualifies?'g':j.passCount>=4?'y':'r';
  const items=[
    ['$',j.price.toFixed(2),'up'],
    ['Score',j.passCount+'/8', j.qualifies?'up':j.passCount>=4?'warn':'dn'],
    ['RS',j.rsRating==null?'—':j.rsRating, j.rsRating>=70?'up':j.rsRating>=40?'warn':'dn'],
    ['50MA',j.ma.ma50?.toFixed(2)??'—',''],
    ['150MA',j.ma.ma150?.toFixed(2)??'—',''],
    ['200MA',j.ma.ma200?.toFixed(2)??'—',''],
    ['52wH',j.hi52?.toFixed(2)??'—',''],
    ['52wL',j.lo52?.toFixed(2)??'—',''],
    ['vs High',j.pctFromHigh+'%', j.pctFromHigh>=-25?'up':'dn'],
    ['vs Low','+'+j.pctFromLow+'%','up'],
  ];
  items.forEach(([k,v,c])=>{const d=document.createElement('div');d.className='chip '+c;
    d.innerHTML='<b>'+k+'</b><span class="v">'+v+'</span>';box.appendChild(d);});
  const t=document.createElement('div');t.className='tag '+stageClass;t.textContent=j.stage;box.appendChild(t);
  $('lSym').textContent=j.symbol; $('lLast').textContent='Last '+j.price.toFixed(2);
}

function renderPanel(j){
  const sc=j.passCount, cls=j.qualifies?'g':sc>=4?'y':'r';
  let html='<div class="scorebox"><div class="n '+cls+'">'+sc+'/8</div>'+
    '<div class="l">'+j.stage+'</div></div>';
  html+='<h3>Minervini Trend Template</h3><div class="sub">All 8 must pass for a Stage 2 buy candidate.</div>';
  j.criteria.forEach(c=>{
    html+='<div class="crit '+(c.pass?'pass':'fail')+'"><div class="dot">'+(c.pass?'✓':'✕')+'</div>'+
      '<span>'+c.label+(c.value!=null?' · <b>'+c.value+'</b>':'')+'</span></div>';
  });
  html+='<div class="note">RS rating is approximate (weighted momentum vs SPY, mapped 1–99) — '+
    'not a true full-universe percentile. Everything else is computed from live Yahoo daily bars '+
    '('+new Date(j.asOf).toLocaleDateString()+').</div>';
  $('panel').innerHTML=html;
}

// ── candlestick + MA + volume render ──
function draw(){
  if(!DATA) return;
  const cv=$('cv'),ctx=cv.getContext('2d');
  const W=cv.clientWidth||820,dpr=window.devicePixelRatio||1,H=560;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);

  const bars=DATA.bars, n=bars.length;
  const padL=8,padR=64,plotW=W-padL-padR;
  const bw=plotW/n, x=i=>padL+i*bw+bw/2;
  const priceTop=34,priceH=360,priceBot=priceTop+priceH;
  const volTop=priceBot+24,volH=110,volBot=volTop+volH;

  let hi=-1e9,lo=1e9;bars.forEach(b=>{hi=Math.max(hi,b.high);lo=Math.min(lo,b.low);});
  // include MAs in scale
  ['ma50','ma150','ma200'].forEach(k=>DATA.series[k].forEach(v=>{if(v!=null){hi=Math.max(hi,v);lo=Math.min(lo,v);}}));
  hi*=1.03;lo*=0.97;
  const py=v=>priceTop+(1-(v-lo)/(hi-lo))*priceH;

  // grid + axis
  ctx.font='11px Segoe UI';ctx.textAlign='left';
  const step=Math.max(1,Math.ceil((hi-lo)/8));
  const niceStep=[1,2,5,10,20,25,50,100,200].find(s=>s>=step)||step;
  for(let v=Math.ceil(lo/niceStep)*niceStep;v<hi;v+=niceStep){
    const y=py(v);ctx.strokeStyle='#161b24';ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+plotW,y);ctx.stroke();
    ctx.fillStyle='#7a8498';ctx.fillText(v.toFixed(0),padL+plotW+6,y+3);
  }

  // MA lines
  const drawMA=(arr,color,w)=>{ctx.strokeStyle=color;ctx.lineWidth=w;ctx.beginPath();let st=false;
    for(let i=0;i<n;i++){if(arr[i]==null)continue;const yy=py(arr[i]);st?ctx.lineTo(x(i),yy):ctx.moveTo(x(i),yy);st=true;}ctx.stroke();};
  drawMA(DATA.series.ma200,'#c94440',1.6);
  drawMA(DATA.series.ma150,'#d6a312',1.4);
  drawMA(DATA.series.ma50,'#3d7bff',1.6);

  // candles
  const cw=Math.max(1.5,bw*0.62);
  for(let i=0;i<n;i++){const d=bars[i],up=d.close>=d.open;
    ctx.strokeStyle=up?'#16b06a':'#e0433f';ctx.fillStyle=up?'#16b06a':'#e0433f';
    ctx.beginPath();ctx.moveTo(x(i),py(d.high));ctx.lineTo(x(i),py(d.low));ctx.stroke();
    const yo=py(d.open),yc=py(d.close);ctx.fillRect(x(i)-cw/2,Math.min(yo,yc),cw,Math.max(1,Math.abs(yc-yo)));}

  // last price tag
  const last=bars[n-1];
  ctx.fillStyle=last.close>=last.open?'#16b06a':'#e0433f';ctx.fillRect(padL+plotW,py(last.close)-9,padR-2,18);
  ctx.fillStyle='#06140c';ctx.textAlign='right';ctx.font='bold 11px Segoe UI';
  ctx.fillText(last.close.toFixed(2),W-4,py(last.close)+4);ctx.textAlign='left';

  // MA legend
  ctx.font='11px Segoe UI';
  ctx.fillStyle='#3d7bff';ctx.fillText('MA50',padL+plotW-150,priceTop-12);
  ctx.fillStyle='#d6a312';ctx.fillText('MA150',padL+plotW-105,priceTop-12);
  ctx.fillStyle='#c94440';ctx.fillText('MA200',padL+plotW-55,priceTop-12);

  // volume
  let vhi=0;bars.forEach(b=>vhi=Math.max(vhi,b.volume));
  for(let i=0;i<n;i++){const d=bars[i],up=d.close>=d.open;const h=(d.volume/vhi)*volH;
    ctx.fillStyle=up?'rgba(22,176,106,.5)':'rgba(224,67,63,.5)';
    ctx.fillRect(padL+i*bw+bw*0.2,volBot-h,Math.max(1,bw*0.6),h);}
  ctx.fillStyle='#7a8498';ctx.font='12px Segoe UI';ctx.fillText('Volume',padL+8,volTop+14);

  // date axis (first / quarter marks)
  ctx.fillStyle='#6b7488';ctx.font='11px Segoe UI';
  [0,Math.floor(n*0.25),Math.floor(n*0.5),Math.floor(n*0.75),n-1].forEach(i=>{
    const dt=new Date(bars[i].time);ctx.fillText((dt.getMonth()+1)+'/'+dt.getDate(),x(i)-10,H-6);});
}
window.addEventListener('resize',draw);
load();
</script>
</body>
</html>
