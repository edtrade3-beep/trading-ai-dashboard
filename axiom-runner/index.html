<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AM Trading">
  <meta name="theme-color" content="#070d1b">
  <title>AM Trading Platform</title>
  <link rel="icon" type="image/png" href="/axiom-runner/assets/am-trading-logo.png">
  <link rel="shortcut icon" type="image/png" href="/axiom-runner/assets/am-trading-logo.png">
  <link rel="apple-touch-icon" href="/axiom-runner/assets/am-trading-logo.png">
  <style>
    html, body, #root {
      height: 100%;
      margin: 0;
    }
    body {
      background: #fbfcff;
    }
    .boot {
      display: grid;
      place-items: center;
      min-height: 100%;
      color: #182338;
      font: 14px/1.5 system-ui, sans-serif;
    }
    .boot-card {
      max-width: 640px;
      padding: 24px;
      border: 1px solid #d9e1ee;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(17, 35, 64, 0.08);
    }
    .boot-card h1 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .boot-card p {
      margin: 0;
      color: #5a6b85;
    }
    .boot-card pre {
      margin: 16px 0 0;
      white-space: pre-wrap;
      color: #c7254e;
      font: 12px/1.5 Consolas, monospace;
    }

    /* ── Mobile safety net (phones ≤ 767px) ──
       The app sets most layout via inline styles + an isMobile flag, but a few
       dense fixed-column grids and wide tables can still overflow on a phone.
       These rules stop horizontal scroll and keep media/tables inside the viewport
       without touching the React component. */
    @media (max-width: 767px) {
      html, body { overflow-x: hidden; -webkit-text-size-adjust: 100%; }
      #root { max-width: 100vw; }
      img, svg, canvas, video, iframe { max-width: 100%; }
      table { max-width: 100%; }
      /* let any element that declares a fixed pixel width shrink to fit */
      .mobile-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot">
      <div class="boot-card">
        <h1>Loading Axiom Live</h1>
        <p>Preparing the React component in the browser.</p>
      </div>
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- jsPDF for client-side PDF export (scan zone reports) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- TradingView lightweight-charts — interactive live candlestick charts with overlays -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    const root = ReactDOM.createRoot(document.getElementById("root"));

    function renderError(message) {
      root.render(
        React.createElement("div", { className: "boot" },
          React.createElement("div", { className: "boot-card" },
            React.createElement("h1", null, "Axiom Live failed to start"),
            React.createElement("p", null, "The runner page loaded, but the JSX app could not be compiled."),
            React.createElement("pre", null, String(message || "Unknown error"))
          )
        )
      );
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src; s.onload = resolve; s.onerror = () => reject(new Error("failed to load " + src));
        document.head.appendChild(s);
      });
    }

    // Fast path: load the PRECOMPILED JS (build step) — no in-browser Babel on ~2 MB.
    async function boot() {
      try {
        const r = await fetch(`/axiom-runner/axiom-live.compiled.js?v=${Date.now()}`, { cache: "no-store" });
        if (r.ok) {
          new Function(await r.text())();
          const App = window.__AXIOM_APP__;
          if (typeof App === "function") { root.render(React.createElement(App)); return; }
        }
        await bootBabelFallback();   // compiled file missing/stale → transpile in-browser
      } catch (error) {
        try { await bootBabelFallback(); }
        catch (e2) { renderError(e2 && e2.stack ? e2.stack : e2); }
      }
    }

    // Fallback: original in-browser Babel transpile of the raw .jsx (Babel loaded lazily, only if needed).
    async function bootBabelFallback() {
      if (typeof Babel === "undefined") {
        await loadScript("https://unpkg.com/@babel/standalone@7.29.7/babel.min.js");
      }
      const response = await fetch(`/axiom-runner/axiom-live.jsx?v=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error("Unable to read axiom-live.jsx (" + response.status + ")");
      const source = await response.text();
      const prepared = source
        .replace(
          /import\s+\{\s*useState,\s*useEffect,\s*useCallback,\s*useMemo,\s*useRef\s*\}\s+from\s+["']react["'];?/,
          "const { useState, useEffect, useCallback, useMemo, useRef } = React;"
        )
        .replace(/export\s+default\s+function\s+App\s*\(/, "function App(")
        .concat("\nwindow.__AXIOM_APP__ = App;\n");
      const compiled = Babel.transform(prepared, { presets: ["react"], filename: "axiom-live.jsx" }).code;
      new Function(compiled)();
      const App = window.__AXIOM_APP__;
      if (typeof App !== "function") throw new Error("Compiled app did not expose a React component.");
      root.render(React.createElement(App));
    }

    boot();

    // ── Auto-reload after a Render deploy (loop-safe) ──
    // Poll /api/health; when the server's boot time changes (= new deploy), reload — but only once
    // per version, and only after the change is stable for 2 checks (avoids mid-deploy blips & loops).
    (function autoReloadOnDeploy() {
      let baseline = null, pending = null, stable = 0;
      async function check() {
        try {
          const r = await fetch("/api/health", { cache: "no-store" });
          const d = await r.json();
          // Use the deploy commit (stable across restarts) — NOT boot time, which changes on every cold-start.
          const v = d.build || d.version;
          if (!v || v === "local") return;
          if (baseline === null) { baseline = v; return; }
          if (v === baseline) { pending = null; stable = 0; return; }
          if (sessionStorage.getItem("ax_reloaded_for") === v) return;  // already reloaded for this version
          if (v === pending) stable++; else { pending = v; stable = 1; }
          if (stable >= 2) {  // change confirmed across 2 checks (~2 min)
            const el = document.activeElement;
            const typing = el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.isContentEditable);
            if (!typing) { sessionStorage.setItem("ax_reloaded_for", v); location.reload(); }
          }
        } catch (e) { /* offline / mid-deploy — try again next tick */ }
      }
      check();
      setInterval(check, 60000); // every 60s
    })();
  </script>
</body>
</html>
